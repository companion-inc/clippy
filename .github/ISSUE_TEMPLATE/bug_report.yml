name: Bug report
description: Report a reproducible Clippy problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Launch Clippy
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Clippy version
      placeholder: v0.1.0 or commit SHA
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Release DMG
        - Source build
        - CI artifact
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: Include `swift test`, `swift build`, packaging, or app smoke checks you ran.
